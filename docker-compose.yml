services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "false"
      # Permissive on purpose: this is a local take-home exercise with no
      # auth and no deployment target, so we don't tune host/origin allow
      # lists per environment.
      DJANGO_ALLOWED_HOSTS: "*"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000,http://127.0.0.1:3000"
      DJANGO_DB_PATH: "/app/data/db.sqlite3"
    volumes:
      - backend_data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: "http://localhost:8000"
    depends_on:
      - backend

volumes:
  backend_data:
